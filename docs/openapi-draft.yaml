openapi: 3.0.3
info:
  title: Metapi API 草案
  version: "draft-2026-03-16"
  description: |
    该文档用于迁移前冻结接口行为与字段结构。
    与运行时实现可能存在细节差异，以服务端实现为准。
servers:
  - url: /
tags:
  - name: Sites
    description: 站点管理
  - name: Accounts
    description: 账号管理
  - name: AccountTokens
    description: 账号令牌管理
  - name: Routes
    description: 路由与通道
  - name: Checkin
    description: 签到
  - name: Stats
    description: 统计与模型
  - name: Events
    description: 事件
  - name: Tasks
    description: 后台任务
  - name: Settings
    description: 系统设置
  - name: DownstreamKeys
    description: 下游托管 Key
  - name: Monitor
    description: 监控
  - name: Test
    description: 调试工具
  - name: Proxy
    description: 代理接口
  - name: Gemini
    description: Gemini 兼容接口

components:
  securitySchemes:
    adminBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: token
      description: 管理端 AUTH_TOKEN
    proxyBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: token
      description: 代理端 proxy_token 或下游托管 key
    proxyApiKeyHeader:
      type: apiKey
      in: header
      name: x-api-key
    proxyGoogApiKeyHeader:
      type: apiKey
      in: header
      name: x-goog-api-key
    proxyApiKeyQuery:
      type: apiKey
      in: query
      name: key
  schemas:
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
          nullable: true
      required:
        - success
    FailedItem:
      type: object
      properties:
        id:
          type: integer
        message:
          type: string
      required:
        - id
        - message
    BatchActionResponse:
      type: object
      properties:
        success:
          type: boolean
        successIds:
          type: array
          items:
            type: integer
        failedItems:
          type: array
          items:
            $ref: '#/components/schemas/FailedItem'
      required:
        - success
        - successIds
        - failedItems
    Site:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        url:
          type: string
        externalCheckinUrl:
          type: string
          nullable: true
        platform:
          type: string
        proxyUrl:
          type: string
          nullable: true
        useSystemProxy:
          type: boolean
        customHeaders:
          type: string
          nullable: true
        status:
          type: string
        isPinned:
          type: boolean
        sortOrder:
          type: integer
        globalWeight:
          type: number
        apiKey:
          type: string
          nullable: true
        createdAt:
          type: string
          nullable: true
        updatedAt:
          type: string
          nullable: true
      required:
        - id
        - name
        - url
        - platform
        - status
    SiteWithBalance:
      allOf:
        - $ref: '#/components/schemas/Site'
        - type: object
          properties:
            totalBalance:
              type: number
    Account:
      type: object
      properties:
        id:
          type: integer
        siteId:
          type: integer
        username:
          type: string
          nullable: true
        accessToken:
          type: string
          nullable: true
        apiToken:
          type: string
          nullable: true
        balance:
          type: number
          nullable: true
        balanceUsed:
          type: number
          nullable: true
        quota:
          type: number
          nullable: true
        unitCost:
          type: number
          nullable: true
        valueScore:
          type: number
          nullable: true
        status:
          type: string
        isPinned:
          type: boolean
        sortOrder:
          type: integer
        checkinEnabled:
          type: boolean
        lastCheckinAt:
          type: string
          nullable: true
        lastBalanceRefresh:
          type: string
          nullable: true
        extraConfig:
          type: string
          nullable: true
        createdAt:
          type: string
          nullable: true
        updatedAt:
          type: string
          nullable: true
      required:
        - id
        - siteId
        - status
    AccountCapabilities:
      type: object
      properties:
        canCheckin:
          type: boolean
        canRefreshBalance:
          type: boolean
        proxyOnly:
          type: boolean
      required:
        - canCheckin
        - canRefreshBalance
        - proxyOnly
    RuntimeHealth:
      type: object
      properties:
        state:
          type: string
        reason:
          type: string
        source:
          type: string
        checkedAt:
          type: string
          nullable: true
      required:
        - state
        - reason
        - source
    AccountSummary:
      allOf:
        - $ref: '#/components/schemas/Account'
        - type: object
          properties:
            site:
              $ref: '#/components/schemas/Site'
            credentialMode:
              type: string
            capabilities:
              $ref: '#/components/schemas/AccountCapabilities'
            todaySpend:
              type: number
            todayReward:
              type: number
            runtimeHealth:
              $ref: '#/components/schemas/RuntimeHealth'
    AccountToken:
      type: object
      properties:
        id:
          type: integer
        accountId:
          type: integer
        name:
          type: string
        token:
          type: string
        tokenGroup:
          type: string
          nullable: true
        source:
          type: string
        enabled:
          type: boolean
        isDefault:
          type: boolean
        createdAt:
          type: string
          nullable: true
        updatedAt:
          type: string
          nullable: true
    TokenRoute:
      type: object
      properties:
        id:
          type: integer
        modelPattern:
          type: string
        displayName:
          type: string
          nullable: true
        displayIcon:
          type: string
          nullable: true
        modelMapping:
          type: string
          nullable: true
        decisionSnapshot:
          type: object
          nullable: true
        decisionRefreshedAt:
          type: string
          nullable: true
        routingStrategy:
          type: string
        enabled:
          type: boolean
        createdAt:
          type: string
          nullable: true
        updatedAt:
          type: string
          nullable: true
      required:
        - id
        - modelPattern
    RouteSummary:
      allOf:
        - $ref: '#/components/schemas/TokenRoute'
        - type: object
          properties:
            channelCount:
              type: integer
            enabledChannelCount:
              type: integer
            siteNames:
              type: array
              items:
                type: string
    RouteChannel:
      type: object
      properties:
        id:
          type: integer
        routeId:
          type: integer
        accountId:
          type: integer
        tokenId:
          type: integer
          nullable: true
        sourceModel:
          type: string
          nullable: true
        priority:
          type: integer
        weight:
          type: integer
        enabled:
          type: boolean
        manualOverride:
          type: boolean
        successCount:
          type: integer
        failCount:
          type: integer
        totalLatencyMs:
          type: integer
        totalCost:
          type: number
        lastUsedAt:
          type: string
          nullable: true
        lastSelectedAt:
          type: string
          nullable: true
        lastFailAt:
          type: string
          nullable: true
        consecutiveFailCount:
          type: integer
        cooldownLevel:
          type: integer
        cooldownUntil:
          type: string
          nullable: true
    ProxyLogListItem:
      type: object
      properties:
        id:
          type: integer
        createdAt:
          type: string
        routeId:
          type: integer
          nullable: true
        channelId:
          type: integer
          nullable: true
        modelRequested:
          type: string
          nullable: true
        modelActual:
          type: string
          nullable: true
        status:
          type: string
          nullable: true
        httpStatus:
          type: integer
          nullable: true
        latencyMs:
          type: integer
          nullable: true
        totalTokens:
          type: integer
          nullable: true
        retryCount:
          type: integer
          nullable: true
        accountId:
          type: integer
          nullable: true
        siteId:
          type: integer
          nullable: true
        username:
          type: string
          nullable: true
        siteName:
          type: string
          nullable: true
        siteUrl:
          type: string
          nullable: true
        errorMessage:
          type: string
          nullable: true
        promptTokens:
          type: integer
          nullable: true
        completionTokens:
          type: integer
          nullable: true
        estimatedCost:
          type: number
          nullable: true
    ProxyLogDetail:
      allOf:
        - $ref: '#/components/schemas/ProxyLogListItem'
        - type: object
          properties:
            billingDetails:
              type: object
              nullable: true
              additionalProperties: true
    DownstreamApiKey:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        key:
          type: string
        keyMasked:
          type: string
        description:
          type: string
          nullable: true
        enabled:
          type: boolean
        expiresAt:
          type: string
          nullable: true
        maxCost:
          type: number
          nullable: true
        usedCost:
          type: number
        maxRequests:
          type: integer
          nullable: true
        usedRequests:
          type: integer
        supportedModels:
          type: array
          items:
            type: string
        allowedRouteIds:
          type: array
          items:
            type: integer
        siteWeightMultipliers:
          type: object
          additionalProperties:
            type: number
        lastUsedAt:
          type: string
          nullable: true
        createdAt:
          type: string
          nullable: true
        updatedAt:
          type: string
          nullable: true
    Event:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        title:
          type: string
        message:
          type: string
          nullable: true
        level:
          type: string
        read:
          type: boolean
        relatedId:
          type: integer
          nullable: true
        relatedType:
          type: string
          nullable: true
        createdAt:
          type: string
          nullable: true
    BackgroundTask:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        title:
          type: string
        status:
          type: string
        message:
          type: string
        error:
          type: string
          nullable: true
        result:
          type: object
          nullable: true
        dedupeKey:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
        startedAt:
          type: string
          nullable: true
        finishedAt:
          type: string
          nullable: true
        expiresAtMs:
          type: integer
    CheckinLog:
      type: object
      properties:
        id:
          type: integer
        accountId:
          type: integer
        status:
          type: string
        message:
          type: string
          nullable: true
        reward:
          type: string
          nullable: true
        createdAt:
          type: string
          nullable: true
      required:
        - id
        - accountId
        - status
    CheckinLogRow:
      type: object
      properties:
        checkin_logs:
          $ref: '#/components/schemas/CheckinLog'
        accounts:
          $ref: '#/components/schemas/Account'
        sites:
          $ref: '#/components/schemas/Site'
        failureReason:
          $ref: '#/components/schemas/CheckinFailureReason'
      required:
        - checkin_logs
        - accounts
        - sites
        - failureReason
    CheckinFailureReason:
      type: object
      properties:
        code:
          type: string
        category:
          type: string
        title:
          type: string
        actionHint:
          type: string
        detailHint:
          type: string
      required:
        - code
        - category
        - title
        - actionHint
        - detailHint
    DashboardCheckinStats:
      type: object
      properties:
        success:
          type: integer
        failed:
          type: integer
        total:
          type: integer
      required:
        - success
        - failed
        - total
    DashboardProxyStats:
      type: object
      properties:
        success:
          type: integer
        failed:
          type: integer
        total:
          type: integer
        totalTokens:
          type: integer
      required:
        - success
        - failed
        - total
        - totalTokens
    DashboardPerformance:
      type: object
      properties:
        windowSeconds:
          type: integer
        requestsPerMinute:
          type: integer
        tokensPerMinute:
          type: integer
      required:
        - windowSeconds
        - requestsPerMinute
        - tokensPerMinute
    SiteAvailabilityBucket:
      type: object
      properties:
        startUtc:
          type: string
        label:
          type: string
        totalRequests:
          type: integer
        successCount:
          type: integer
        failedCount:
          type: integer
        availabilityPercent:
          type: number
          nullable: true
        averageLatencyMs:
          type: integer
          nullable: true
      required:
        - startUtc
        - label
        - totalRequests
        - successCount
        - failedCount
    SiteAvailabilitySummary:
      type: object
      properties:
        siteId:
          type: integer
        siteName:
          type: string
        siteUrl:
          type: string
          nullable: true
        platform:
          type: string
          nullable: true
        totalRequests:
          type: integer
        successCount:
          type: integer
        failedCount:
          type: integer
        availabilityPercent:
          type: number
          nullable: true
        averageLatencyMs:
          type: integer
          nullable: true
        buckets:
          type: array
          items:
            $ref: '#/components/schemas/SiteAvailabilityBucket'
      required:
        - siteId
        - siteName
        - totalRequests
        - successCount
        - failedCount
        - buckets
    ModelAnalysisWindow:
      type: object
      properties:
        start:
          type: string
        end:
          type: string
        days:
          type: integer
      required:
        - start
        - end
        - days
    ModelAnalysisTotals:
      type: object
      properties:
        calls:
          type: integer
        tokens:
          type: integer
        spend:
          type: number
      required:
        - calls
        - tokens
        - spend
    ModelAnalysisSpendDistribution:
      type: object
      properties:
        model:
          type: string
        spend:
          type: number
        calls:
          type: integer
      required:
        - model
        - spend
        - calls
    ModelAnalysisSpendTrend:
      type: object
      properties:
        day:
          type: string
        spend:
          type: number
      required:
        - day
        - spend
    ModelAnalysisCallsDistribution:
      type: object
      properties:
        model:
          type: string
        calls:
          type: integer
        share:
          type: number
      required:
        - model
        - calls
        - share
    ModelAnalysisCallRanking:
      type: object
      properties:
        model:
          type: string
        calls:
          type: integer
        successRate:
          type: number
        avgLatencyMs:
          type: integer
        spend:
          type: number
        tokens:
          type: integer
      required:
        - model
        - calls
        - successRate
        - avgLatencyMs
        - spend
        - tokens
    ModelAnalysis:
      type: object
      properties:
        window:
          $ref: '#/components/schemas/ModelAnalysisWindow'
        totals:
          $ref: '#/components/schemas/ModelAnalysisTotals'
        spendDistribution:
          type: array
          items:
            $ref: '#/components/schemas/ModelAnalysisSpendDistribution'
        spendTrend:
          type: array
          items:
            $ref: '#/components/schemas/ModelAnalysisSpendTrend'
        callsDistribution:
          type: array
          items:
            $ref: '#/components/schemas/ModelAnalysisCallsDistribution'
        callRanking:
          type: array
          items:
            $ref: '#/components/schemas/ModelAnalysisCallRanking'
      required:
        - window
        - totals
        - spendDistribution
        - spendTrend
        - callsDistribution
        - callRanking
    DashboardStats:
      type: object
      properties:
        totalBalance:
          type: number
        totalUsed:
          type: number
        todaySpend:
          type: number
        todayReward:
          type: number
        activeAccounts:
          type: integer
        totalAccounts:
          type: integer
        todayCheckin:
          $ref: '#/components/schemas/DashboardCheckinStats'
        proxy24h:
          $ref: '#/components/schemas/DashboardProxyStats'
        performance:
          $ref: '#/components/schemas/DashboardPerformance'
        siteAvailability:
          type: array
          items:
            $ref: '#/components/schemas/SiteAvailabilitySummary'
        modelAnalysis:
          $ref: '#/components/schemas/ModelAnalysis'
      required:
        - totalBalance
        - totalUsed
        - todaySpend
        - todayReward
        - activeAccounts
        - totalAccounts
        - todayCheckin
        - proxy24h
        - performance
        - siteAvailability
        - modelAnalysis
    ProxyLogSummary:
      type: object
      properties:
        totalCount:
          type: integer
        successCount:
          type: integer
        failedCount:
          type: integer
        totalCost:
          type: number
        totalTokensAll:
          type: integer
      required:
        - totalCount
        - successCount
        - failedCount
        - totalCost
        - totalTokensAll
    ProxyLogListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProxyLogListItem'
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
        summary:
          $ref: '#/components/schemas/ProxyLogSummary'
      required:
        - items
        - total
        - page
        - pageSize
        - summary
    ModelMarketplaceAccountToken:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        isDefault:
          type: boolean
      required:
        - id
        - name
        - isDefault
    ModelMarketplaceAccount:
      type: object
      properties:
        id:
          type: integer
        site:
          type: string
        username:
          type: string
          nullable: true
        latency:
          type: integer
          nullable: true
        unitCost:
          type: number
          nullable: true
        balance:
          type: number
        tokens:
          type: array
          items:
            $ref: '#/components/schemas/ModelMarketplaceAccountToken'
      required:
        - id
        - site
        - balance
        - tokens
    ModelMarketplaceGroupPricing:
      type: object
      properties:
        quotaType:
          type: integer
        inputPerMillion:
          type: number
          nullable: true
        outputPerMillion:
          type: number
          nullable: true
        perCallInput:
          type: number
          nullable: true
        perCallOutput:
          type: number
          nullable: true
        perCallTotal:
          type: number
          nullable: true
    ModelMarketplacePricingSource:
      type: object
      properties:
        siteId:
          type: integer
        siteName:
          type: string
        accountId:
          type: integer
        username:
          type: string
          nullable: true
        ownerBy:
          type: string
          nullable: true
        enableGroups:
          type: array
          items:
            type: string
        groupPricing:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/ModelMarketplaceGroupPricing'
      required:
        - siteId
        - siteName
        - accountId
        - enableGroups
        - groupPricing
    ModelMarketplaceModel:
      type: object
      properties:
        name:
          type: string
        accountCount:
          type: integer
        tokenCount:
          type: integer
        avgLatency:
          type: integer
        successRate:
          type: number
          nullable: true
        description:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        supportedEndpointTypes:
          type: array
          items:
            type: string
        pricingSources:
          type: array
          items:
            $ref: '#/components/schemas/ModelMarketplacePricingSource'
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/ModelMarketplaceAccount'
      required:
        - name
        - accountCount
        - tokenCount
        - avgLatency
        - tags
        - supportedEndpointTypes
        - pricingSources
        - accounts
    ModelMarketplaceMeta:
      type: object
      properties:
        refreshRequested:
          type: boolean
        refreshQueued:
          type: boolean
        refreshReused:
          type: boolean
        refreshRunning:
          type: boolean
        refreshJobId:
          type: string
          nullable: true
        includePricing:
          type: boolean
        cacheHit:
          type: boolean
      required:
        - refreshRequested
        - refreshQueued
        - refreshReused
        - refreshRunning
        - includePricing
    ModelMarketplaceResponse:
      type: object
      properties:
        models:
          type: array
          items:
            $ref: '#/components/schemas/ModelMarketplaceModel'
        meta:
          $ref: '#/components/schemas/ModelMarketplaceMeta'
      required:
        - models
        - meta
    TokenCandidateModelToken:
      type: object
      properties:
        accountId:
          type: integer
        tokenId:
          type: integer
        tokenName:
          type: string
        isDefault:
          type: boolean
        username:
          type: string
          nullable: true
        siteId:
          type: integer
        siteName:
          type: string
      required:
        - accountId
        - tokenId
        - tokenName
        - isDefault
        - siteId
        - siteName
    TokenCandidateAccount:
      type: object
      properties:
        accountId:
          type: integer
        username:
          type: string
          nullable: true
        siteId:
          type: integer
        siteName:
          type: string
      required:
        - accountId
        - siteId
        - siteName
    TokenCandidateMissingGroup:
      type: object
      properties:
        accountId:
          type: integer
        username:
          type: string
          nullable: true
        siteId:
          type: integer
        siteName:
          type: string
        missingGroups:
          type: array
          items:
            type: string
        requiredGroups:
          type: array
          items:
            type: string
        availableGroups:
          type: array
          items:
            type: string
        groupCoverageUncertain:
          type: boolean
      required:
        - accountId
        - siteId
        - siteName
        - missingGroups
        - requiredGroups
        - availableGroups
    TokenCandidateResponse:
      type: object
      properties:
        models:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/TokenCandidateModelToken'
        modelsWithoutToken:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/TokenCandidateAccount'
        modelsMissingTokenGroups:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/TokenCandidateMissingGroup'
        endpointTypesByModel:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
      required:
        - models
        - modelsWithoutToken
        - modelsMissingTokenGroups
        - endpointTypesByModel
    ModelRefreshResult:
      type: object
      properties:
        accountId:
          type: integer
        refreshed:
          type: boolean
        status:
          type: string
        errorCode:
          type: string
          nullable: true
        errorMessage:
          type: string
          nullable: true
        modelCount:
          type: integer
        modelsPreview:
          type: array
          items:
            type: string
        tokenScanned:
          type: integer
          nullable: true
        discoveredByCredential:
          type: boolean
          nullable: true
        discoveredApiToken:
          type: boolean
          nullable: true
        reason:
          type: string
          nullable: true
      required:
        - accountId
        - refreshed
        - status
        - modelCount
        - modelsPreview
    RouteRebuildResult:
      type: object
      properties:
        models:
          type: integer
        createdRoutes:
          type: integer
        createdChannels:
          type: integer
        removedChannels:
          type: integer
        removedRoutes:
          type: integer
      required:
        - models
        - createdRoutes
        - createdChannels
        - removedChannels
        - removedRoutes
    ModelCheckResponse:
      type: object
      properties:
        success:
          type: boolean
        refresh:
          $ref: '#/components/schemas/ModelRefreshResult'
        rebuild:
          $ref: '#/components/schemas/RouteRebuildResult'
        error:
          type: string
      required:
        - success
    SiteDistributionItem:
      type: object
      properties:
        siteId:
          type: integer
        siteName:
          type: string
        platform:
          type: string
          nullable: true
        totalBalance:
          type: number
        totalSpend:
          type: number
        accountCount:
          type: integer
      required:
        - siteId
        - siteName
        - totalBalance
        - totalSpend
        - accountCount
    SiteDistributionResponse:
      type: object
      properties:
        distribution:
          type: array
          items:
            $ref: '#/components/schemas/SiteDistributionItem'
      required:
        - distribution
    SiteTrendSiteStats:
      type: object
      properties:
        spend:
          type: number
        calls:
          type: integer
      required:
        - spend
        - calls
    SiteTrendEntry:
      type: object
      properties:
        date:
          type: string
        sites:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/SiteTrendSiteStats'
      required:
        - date
        - sites
    SiteTrendResponse:
      type: object
      properties:
        trend:
          type: array
          items:
            $ref: '#/components/schemas/SiteTrendEntry'
      required:
        - trend
    ModelBySiteItem:
      type: object
      properties:
        model:
          type: string
        calls:
          type: integer
        spend:
          type: number
        tokens:
          type: integer
      required:
        - model
        - calls
        - spend
        - tokens
    ModelBySiteResponse:
      type: object
      properties:
        models:
          type: array
          items:
            $ref: '#/components/schemas/ModelBySiteItem'
      required:
        - models
    TaskDetailResponse:
      type: object
      properties:
        success:
          type: boolean
        task:
          $ref: '#/components/schemas/BackgroundTask'
        message:
          type: string
      required:
        - success

