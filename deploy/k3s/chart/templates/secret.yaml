apiVersion: v1
kind: Secret
metadata:
  name: {{ include "metapi.envSecretName" . }}
  labels:
    {{- include "metapi.labels" . | nindent 4 }}
type: Opaque
stringData:
  AUTH_TOKEN: {{ required "env.authToken is required" .Values.env.authToken | quote }}
  PROXY_TOKEN: {{ required "env.proxyToken is required" .Values.env.proxyToken | quote }}
  DB_TYPE: {{ .Values.env.dbType | quote }}
  {{- if eq (lower (toString .Values.env.dbType)) "sqlite" }}
  DB_URL: {{ default "./data/hub.db" .Values.env.dbUrl | quote }}
  {{- else }}
  DB_URL: {{ required "env.dbUrl is required when env.dbType is mysql/postgres" .Values.env.dbUrl | quote }}
  {{- end }}
  DB_SSL: {{ .Values.env.dbSsl | quote }}
  DATA_DIR: {{ .Values.env.dataDir | quote }}
  PORT: {{ .Values.env.port | quote }}
  TZ: {{ .Values.env.tz | quote }}
  CHECKIN_CRON: {{ .Values.env.checkinCron | quote }}
  BALANCE_REFRESH_CRON: {{ .Values.env.balanceRefreshCron | quote }}
  DEPLOY_HELPER_TOKEN: {{ .Values.env.deployHelperToken | quote }}
